# ============================================================
# Inverted Pendulum DQN — Configuration
# ============================================================

physics:
  cart_mass: 1.0
  pole_mass: 0.1
  pole_half_length: 0.5
  gravity: 9.81
  force_max: 10.0
  timestep: 0.02

environment:
  max_steps: 500
  angle_threshold_deg: 12.0
  position_threshold: 2.4
  initial_perturbation: 0.05

reward:
  alive_bonus: 1.0
  angle_weight: -10.0
  position_weight: -5.0
  velocity_weight: -0.1
  death_penalty: -10.0

network:
  hidden_layers: [128, 64]
  activation: relu
  initializer: he_normal

training:
  num_episodes: 2000
  learning_rate: 0.0005
  gamma: 0.99
  batch_size: 64
  replay_buffer_size: 10000
  clip_norm: 1.0
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  log_interval: 50
  save_interval: 100
  use_target_network: true
  target_update_freq: 10
  pretrained_weights: results/weights_target_network_1000ep.json

visualization:
  fps: 50
  figure_size: [10, 6]
  cart_width: 0.4
  cart_height: 0.2
  save_gif: true
